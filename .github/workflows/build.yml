name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Install dependencies
        run: |
          pip install buildozer
          pip install cython==0.29.33

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log
          grep -i "gradle\|error\|exception" build.log | grep -v "ENVIRONMENT" | tail -30

      - name: Find APK
        run: |
          find /home/runner -name "*.apk" 2>/dev/null
          find . -name "*.apk" 2>/dev/null
          echo "=== bin directory ==="
          ls -la bin/ 2>/dev/null || echo "bin/ not found"
          echo "=== buildozer directory ==="
          find .buildozer -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: space-shooter-apk
          path: bin/*.apk
